<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video Intel — Results</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
        }

        /* ── Header ──────────────────────────────────── */
        header {
            background: #111;
            border-bottom: 1px solid #222;
            padding: 14px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .back-btn {
            color: #888;
            text-decoration: none;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.15s;
        }

        .back-btn:hover {
            color: #e0e0e0;
        }

        header h1 {
            font-size: 17px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        header h1 span {
            color: #e50914;
        }

        .vid-id-badge {
            font-family: monospace;
            font-size: 11px;
            color: #555;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 4px;
            padding: 3px 8px;
        }

        #health-bar {
            display: flex;
            gap: 10px;
            font-size: 12px;
        }

        .pill {
            padding: 3px 10px;
            border-radius: 20px;
            background: #2a2a2a;
            color: #888;
        }

        .pill.ok {
            background: #1a3a1a;
            color: #4caf50;
        }

        .pill.error {
            background: #3a1a1a;
            color: #f44336;
        }

        /* ── Loading / error ─────────────────────────── */
        #loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            gap: 18px;
            color: #888;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid #2a2a2a;
            border-top-color: #e50914;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error-msg {
            background: #1a0a0a;
            border: 1px solid #5a1a1a;
            border-radius: 8px;
            padding: 20px 28px;
            color: #f44336;
            font-size: 14px;
        }

        /* ── Player section ──────────────────────────── */
        #player-section {
            display: flex;
            width: 100%;
            background: #000;
            border-bottom: 1px solid #1a1a1a;
        }

        #player-section.hidden {
            display: none;
        }

        /* Actor panel (left sidebar) */
        .actor-panel {
            width: 220px;
            min-width: 220px;
            background: #0d0d0d;
            border-right: 1px solid #1e1e1e;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            padding: 12px 16px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: #e50914;
            text-transform: uppercase;
            border-bottom: 1px solid #1e1e1e;
            background: #0a0a0a;
        }

        #actor-cards {
            flex: 1;
            overflow-y: auto;
            padding: 10px 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .actor-card {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            background: #141414;
            border: 1px solid #252525;
            border-radius: 8px;
            animation: slideIn 0.25s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-12px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .actor-card img {
            width: 44px;
            height: 44px;
            border-radius: 6px;
            object-fit: cover;
            background: #1e1e1e;
            flex-shrink: 0;
            border: 1.5px solid #00e5ff44;
        }

        .actor-info {
            overflow: hidden;
        }

        .actor-name {
            font-size: 12px;
            font-weight: 600;
            color: #e0e0e0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .actor-score {
            font-size: 10px;
            color: #00e5ff;
            margin-top: 2px;
        }

        .no-actors {
            font-size: 12px;
            color: #444;
            text-align: center;
            padding: 24px 8px;
        }

        /* Video container */
        .video-container {
            flex: 1;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 420px;
        }

        .video-container video {
            display: block;
            width: 100%;
            height: 100%;
            max-height: 540px;
            object-fit: contain;
        }

        .video-container canvas {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            /* Canvas internal size set in JS; CSS matches video letterboxed size */
        }

        /* ── Color legend ────────────────────────────── */
        .legend {
            display: flex;
            gap: 16px;
            padding: 8px 20px;
            background: #0d0d0d;
            border-bottom: 1px solid #1a1a1a;
            font-size: 11px;
            color: #666;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .leg-dot {
            width: 10px;
            height: 10px;
            border-radius: 2px;
            border: 2px solid;
        }

        /* ── Main content ────────────────────────────── */
        main {
            max-width: 960px;
            margin: 32px auto;
            padding: 0 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        main.hidden {
            display: none;
        }

        .card {
            background: #141414;
            border: 1px solid #222;
            border-radius: 10px;
            padding: 20px 24px;
        }

        .section-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #555;
            margin-bottom: 14px;
        }

        /* Meta bar */
        .meta-bar {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .meta-value {
            font-size: 22px;
            font-weight: 700;
            color: #e0e0e0;
            letter-spacing: -0.5px;
        }

        .meta-key {
            font-size: 10px;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Screentime */
        .screentime-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .st-card {
            background: #0f1a2a;
            border: 1px solid #1e3a5a;
            border-radius: 8px;
            padding: 10px 16px;
            min-width: 150px;
        }

        .st-name {
            font-size: 13px;
            color: #7ab8f5;
            font-weight: 600;
            margin-bottom: 3px;
        }

        .st-stats {
            font-size: 11px;
            color: #556;
        }

        .st-bar-bg {
            height: 3px;
            background: #1e3a5a;
            border-radius: 2px;
            margin-top: 6px;
        }

        .st-bar-fill {
            height: 100%;
            background: #7ab8f5;
            border-radius: 2px;
        }

        /* Objects */
        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .obj-chip {
            background: #1a1027;
            border: 1px solid #2e1a50;
            color: #ce93d8;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 12px;
        }

        .face-chip {
            background: #0f1e30;
            border: 1px solid #1a3a5a;
            color: #7ab8f5;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 12px;
        }

        /* Timeline */
        .timeline-scroll {
            max-height: 380px;
            overflow-y: auto;
        }

        .tl-item {
            display: flex;
            gap: 14px;
            padding: 10px 0;
            border-bottom: 1px solid #1e1e1e;
            align-items: flex-start;
        }

        .tl-item:last-child {
            border-bottom: none;
        }

        .timecode {
            font-family: monospace;
            font-size: 11px;
            color: #555;
            min-width: 48px;
            padding-top: 3px;
        }

        .tl-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            flex: 1;
        }
    </style>
</head>

<body>

    <header>
        <div class="header-left">
            <a href="/" class="back-btn">← Back</a>
            <h1>Video <span>Intel</span></h1>
            <span class="vid-id-badge" id="vid-badge">Loading…</span>
        </div>
        <div id="health-bar">
            <span class="pill" id="pill-redis">Redis …</span>
            <span class="pill" id="pill-db">DB …</span>
            <span class="pill" id="pill-actors">Actors …</span>
        </div>
    </header>

    <!-- Loading state -->
    <div id="loading">
        <div class="spinner"></div>
        <div style="font-size:14px;color:#555;">Loading video &amp; results…</div>
    </div>

    <!-- Player + Actor panel -->
    <div id="player-section" class="hidden">
        <div class="actor-panel">
            <div class="panel-header">🎬 Now on Screen</div>
            <div id="actor-cards">
                <div class="no-actors">Play the video to see actors</div>
            </div>
        </div>

        <div class="video-container" id="video-container">
            <video id="player" controls></video>
            <canvas id="overlay"></canvas>
        </div>
    </div>

    <!-- Color legend -->
    <div class="legend" id="legend" style="display:none;">
        <span class="legend-item">
            <span class="leg-dot" style="border-color:#00e5ff;"></span> Recognised Actor
        </span>
        <span class="legend-item">
            <span class="leg-dot" style="border-color:#ffd600;"></span> Unidentified Person
        </span>
        <span class="legend-item">
            <span class="leg-dot" style="border-color:#ce93d8;"></span> YOLO Object
        </span>
    </div>

    <!-- Results content -->
    <main id="results-section" class="hidden">

        <!-- Metadata -->
        <div class="card">
            <div class="section-label">Video Stats</div>
            <div class="meta-bar" id="meta-bar">—</div>
        </div>

        <!-- Screentime -->
        <div class="card" id="screentime-card" style="display:none;">
            <div class="section-label">Screentime</div>
            <div class="screentime-grid" id="screentime-grid"></div>
        </div>

        <!-- Objects summary -->
        <div class="card" id="objects-card" style="display:none;">
            <div class="section-label">Objects Detected</div>
            <div class="chips" id="objects-chips"></div>
        </div>

        <!-- Timeline -->
        <div class="card">
            <div class="section-label">Frame-by-Frame Timeline</div>
            <div class="timeline-scroll" id="timeline-list"></div>
        </div>

    </main>

    <script>
        const API = 'http://127.0.0.1:8000';
        const videoId = window.location.pathname.split('/').pop();

        let tlData = null;
        let timestamps = [];
        let prevActorNames = new Set();

        const video = document.getElementById('player');
        const canvas = document.getElementById('overlay');
        const ctx = canvas.getContext('2d');

        // ── Health ──────────────────────────────────────────
        (async () => {
            try {
                const r = await fetch(`${API}/health`);
                const d = await r.json();
                setPill('pill-redis', 'Redis', d.redis);
                setPill('pill-db', 'DB', d.db);
                const ap = document.getElementById('pill-actors');
                ap.textContent = `${d.actors_loaded} Actors`;
                ap.className = 'pill ok';
            } catch {
                ['pill-redis', 'pill-db', 'pill-actors'].forEach(id => {
                    const el = document.getElementById(id);
                    el.textContent = el.textContent.split(' ')[0] + ' ✗';
                    el.className = 'pill error';
                });
            }
        })();

        function setPill(id, label, status) {
            const el = document.getElementById(id);
            el.textContent = status === 'ok' ? `${label} ✓` : `${label} ✗`;
            el.className = 'pill ' + (status === 'ok' ? 'ok' : 'error');
        }

        // ── Init ─────────────────────────────────────────────
        document.getElementById('vid-badge').textContent = `video_id: ${videoId}`;

        async function init() {
            try {
                // 1. Resolve the video URL
                const vr = await fetch(`${API}/video-url/${videoId}`);
                if (!vr.ok) throw new Error(`Video not found (${vr.status})`);
                const vd = await vr.json();
                video.src = vd.url;

                // 2. Load pipeline results
                const mr = await fetch(`${API}/metadata/${videoId}`);
                if (!mr.ok) throw new Error(`Results not ready (${mr.status}). Has the video finished processing?`);
                tlData = await mr.json();

                // Build sorted timestamp index
                timestamps = Object.keys(tlData.timeline)
                    .map(Number)
                    .sort((a, b) => a - b);

                // 3. Render static sections
                renderMeta(tlData.metadata || {});
                renderScreentime(tlData.screentime || {});
                renderObjects(tlData.objects_summary || {});
                renderTimeline(tlData.timeline || {});

                // 4. Reveal UI
                document.getElementById('loading').style.display = 'none';
                document.getElementById('player-section').classList.remove('hidden');
                document.getElementById('legend').style.display = 'flex';
                document.getElementById('results-section').classList.remove('hidden');

            } catch (err) {
                document.getElementById('loading').innerHTML =
                    `<div class="error-msg">❌ ${err.message}</div>`;
            }
        }

        init();

        // ── Canvas resize ────────────────────────────────────
        video.addEventListener('loadedmetadata', () => {
            // Set canvas internal resolution = native video resolution.
            // CSS sizes the canvas to match the displayed video element.
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            syncCanvasSize();
        });

        function syncCanvasSize() {
            // Match CSS pixel size of the letterboxed video inside .video-container
            const vRect = video.getBoundingClientRect();
            canvas.style.width = vRect.width + 'px';
            canvas.style.height = vRect.height + 'px';
        }

        window.addEventListener('resize', syncCanvasSize);

        // ── Render loop ──────────────────────────────────────
        video.addEventListener('timeupdate', () => {
            const frame = frameAt(video.currentTime);
            drawFrame(frame);
            updateActorPanel(frame);
        });

        function frameAt(t) {
            if (!timestamps.length) return null;
            let lo = 0, hi = timestamps.length - 1, best = 0;
            while (lo <= hi) {
                const mid = (lo + hi) >> 1;
                if (timestamps[mid] <= t) { best = mid; lo = mid + 1; }
                else hi = mid - 1;
            }
            return tlData.timeline[timestamps[best]] || null;
        }

        // ── Canvas drawing ───────────────────────────────────
        function drawFrame(frame) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (!frame) return;

            // Actor / person bounding boxes
            for (const hit of (frame.actors || [])) {
                if (!hit.bbox) continue;
                const recognised = hit.actor != null;
                const color = recognised ? '#00e5ff' : '#ffd600';
                const label = recognised
                    ? `${hit.actor}  ${Math.round(hit.score * 100)}%`
                    : 'Person';
                drawBox(...hit.bbox, color, label);
            }

            // YOLO object bounding boxes
            for (const obj of (frame.objects || [])) {
                if (!obj.bbox) continue;
                const label = `${obj.label}  ${Math.round((obj.confidence || 0) * 100)}%`;
                drawBox(...obj.bbox, '#ce93d8', label);
            }
        }

        function drawBox(x, y, w, h, color, label) {
            if (w < 8 || h < 8) return; // skip degenerate boxes

            // Glow rectangle
            ctx.save();
            ctx.strokeStyle = color;
            ctx.lineWidth = 2.5;
            ctx.shadowColor = color;
            ctx.shadowBlur = 10;
            ctx.strokeRect(x, y, w, h);
            ctx.restore();

            // Label pill
            ctx.font = 'bold 13px system-ui, sans-serif';
            const tw = ctx.measureText(label).width;
            const ph = 22;
            const pw = tw + 12;
            const py = y >= ph + 2 ? y - ph : y + h;   // above or below box

            // Pill background
            ctx.fillStyle = '#000000cc';
            ctx.beginPath();
            ctx.roundRect(x - 1, py, pw, ph, 4);
            ctx.fill();

            // Pill text
            ctx.fillStyle = color;
            ctx.fillText(label, x + 5, py + 15);
        }

        // ── Actor panel ──────────────────────────────────────
        function updateActorPanel(frame) {
            const recognised = (frame?.actors || []).filter(h => h.actor != null);
            const currentNames = new Set(recognised.map(h => h.actor));

            // Bail out if nothing changed (avoids flicker)
            if (
                currentNames.size === prevActorNames.size &&
                [...currentNames].every(n => prevActorNames.has(n))
            ) return;

            prevActorNames = currentNames;
            const cards = document.getElementById('actor-cards');

            if (!recognised.length) {
                cards.innerHTML = '<div class="no-actors">No actors on screen</div>';
                return;
            }

            cards.innerHTML = recognised.map(h => `
        <div class="actor-card">
          <img
            src="/actor-photos/${encodeURIComponent(h.actor)}.jpg"
            alt="${h.actor}"
            onerror="this.style.display='none'"
          />
          <div class="actor-info">
            <div class="actor-name">${h.actor}</div>
            <div class="actor-score">${Math.round(h.score * 100)}% match</div>
          </div>
        </div>
      `).join('');
        }

        // ── Static section renderers ─────────────────────────
        function renderMeta(m) {
            const dur = (m.duration_seconds || 0).toFixed(1);
            const fps = (m.fps || 0).toFixed(1);
            const frs = m.frames_processed || 0;
            const proc = (m.processing_time_seconds || 0).toFixed(1);
            document.getElementById('meta-bar').innerHTML = `
        <div class="meta-item">
          <div class="meta-value">${dur}s</div>
          <div class="meta-key">Duration</div>
        </div>
        <div class="meta-item">
          <div class="meta-value">${fps}</div>
          <div class="meta-key">FPS</div>
        </div>
        <div class="meta-item">
          <div class="meta-value">${frs}</div>
          <div class="meta-key">Frames Sampled</div>
        </div>
        <div class="meta-item">
          <div class="meta-value">${proc}s</div>
          <div class="meta-key">Processing Time</div>
        </div>
      `;
        }

        function renderScreentime(st) {
            const names = Object.keys(st);
            if (!names.length) return;
            const maxSec = Math.max(...names.map(n => st[n].seconds));
            document.getElementById('screentime-grid').innerHTML = names.map(name => {
                const s = st[name];
                const pct = maxSec > 0 ? Math.round((s.seconds / maxSec) * 100) : 0;
                return `
          <div class="st-card">
            <div class="st-name">${name}</div>
            <div class="st-stats">
              ${s.scenes} frame${s.scenes !== 1 ? 's' : ''} · ${s.seconds}s on screen
            </div>
            <div class="st-bar-bg">
              <div class="st-bar-fill" style="width:${pct}%"></div>
            </div>
          </div>`;
            }).join('');
            document.getElementById('screentime-card').style.display = '';
        }

        function renderObjects(summary) {
            const entries = Object.entries(summary);
            if (!entries.length) return;
            document.getElementById('objects-chips').innerHTML = entries
                .sort(([, a], [, b]) => b - a)
                .map(([k, v]) => `<span class="obj-chip">${k} ×${v}</span>`)
                .join('');
            document.getElementById('objects-card').style.display = '';
        }

        function renderTimeline(timeline) {
            const list = document.getElementById('timeline-list');
            const sorted = Object.entries(timeline)
                .map(([k, v]) => [parseInt(k), v])
                .sort(([a], [b]) => a - b);

            let html = '';
            for (const [sec, frame] of sorted) {
                const actors = frame.actors || [];
                const objects = frame.objects || [];
                if (!actors.length && !objects.length) continue;

                const tc = fmtTime(sec);
                const fChips = actors.map(h => {
                    const name = (h && typeof h === 'object') ? (h.actor || 'Person') : h;
                    return `<span class="face-chip">${name}</span>`;
                }).join('');
                const oChips = objects.map(o => {
                    const label = (o && typeof o === 'object') ? o.label : o;
                    return `<span class="obj-chip">${label}</span>`;
                }).join('');

                html += `
          <div class="tl-item">
            <div class="timecode">${tc}</div>
            <div class="tl-chips">${fChips}${oChips}</div>
          </div>`;
            }
            list.innerHTML = html || '<div style="color:#555;font-size:13px;">No detections found.</div>';
        }

        function fmtTime(s) {
            const m = Math.floor(s / 60);
            const r = Math.floor(s % 60);
            return `${String(m).padStart(2, '0')}:${String(r).padStart(2, '0')}`;
        }
    </script>
</body>

</html>
